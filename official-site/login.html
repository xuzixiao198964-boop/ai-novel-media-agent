<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录 / 注册 - AI 创作平台</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.login-container {
  background: #fff;
  border-radius: 16px;
  padding: 48px;
  max-width: 400px;
  width: 100%;
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
}

.logo {
  text-align: center;
  font-size: 1.8rem;
  font-weight: 700;
  background: linear-gradient(90deg, #6366f1, #8b5cf6);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 32px;
}

.form-group {
  margin-bottom: 20px;
}

.form-group label {
  display: block;
  font-size: 0.9rem;
  font-weight: 600;
  margin-bottom: 8px;
  color: #334155;
}

.form-group input {
  width: 100%;
  padding: 12px;
  border: 1px solid #e5e7eb;
  border-radius: 8px;
  font-size: 0.95rem;
  transition: border-color 0.2s;
}

.form-group input:focus {
  outline: none;
  border-color: #6366f1;
}

.btn {
  width: 100%;
  padding: 14px;
  background: #6366f1;
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.2s;
}

.btn:hover {
  background: #4f46e5;
}

.divider {
  text-align: center;
  margin: 24px 0;
  color: #94a3b8;
  font-size: 0.85rem;
}

.social-login {
  display: flex;
  gap: 12px;
}

.social-btn {
  flex: 1;
  padding: 12px;
  border: 1px solid #e5e7eb;
  border-radius: 8px;
  background: #fff;
  cursor: pointer;
  font-size: 1.2rem;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}

.social-btn:hover {
  border-color: #6366f1;
  background: #f8fafc;
}

.social-btn svg {
  width: 20px;
  height: 20px;
}

.error-message {
  background: #fee;
  color: #c33;
  padding: 12px;
  border-radius: 8px;
  margin-bottom: 16px;
  font-size: 0.9rem;
  display: none;
}

.error-message.show {
  display: block;
}

.footer-links {
  text-align: center;
  margin-top: 24px;
  font-size: 0.85rem;
  color: #64748b;
}

.footer-links a {
  color: #6366f1;
  text-decoration: none;
}

.footer-links a:hover {
  text-decoration: underline;
}
</style>
</head>
<body>
<div class="login-container">
<div class="logo">AI 创作平台</div>
<div id="errorMessage" class="error-message"></div>
<form id="loginForm">
<div class="form-group">
<label>邮箱 / 手机号</label>
<input type="text" id="username" placeholder="请输入邮箱或手机号" required>
</div>
<div class="form-group">
<label>密码</label>
<input type="password" id="password" placeholder="请输入密码" required>
</div>
<button type="submit" class="btn">登录</button>
</form>
<div class="divider">或使用第三方登录</div>
<div class="social-login">
<button class="social-btn" onclick="thirdPartyLogin('wechat')">
<svg viewBox="0 0 24 24" fill="#09BB07"><path d="M8.5 9.5c.8 0 1.5-.7 1.5-1.5S9.3 6.5 8.5 6.5 7 7.2 7 8s.7 1.5 1.5 1.5zm7 0c.8 0 1.5-.7 1.5-1.5s-.7-1.5-1.5-1.5S14 7.2 14 8s.7 1.5 1.5 1.5zM12 2C6.5 2 2 6 2 11c0 2.4 1 4.5 2.7 6.1l-.6 3.9 4-2c1.2.4 2.5.6 3.9.6 5.5 0 10-4 10-9s-4.5-9-10-9z"/></svg>
微信
</button>
<button class="social-btn" onclick="thirdPartyLogin('qq')">
<svg viewBox="0 0 24 24" fill="#12B7F5"><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10 10-4.5 10-10S17.5 2 12 2zm3.5 13.5c-.3.8-1.5 1.5-3.5 1.5s-3.2-.7-3.5-1.5c-.1-.3.1-.5.4-.5.2 0 .4.1.5.3.2.4 1.1.9 2.6.9s2.4-.5 2.6-.9c.1-.2.3-.3.5-.3.3 0 .5.2.4.5zM9 11c-.6 0-1-.4-1-1s.4-1 1-1 1 .4 1 1-.4 1-1 1zm6 0c-.6 0-1-.4-1-1s.4-1 1-1 1 .4 1 1-.4 1-1 1z"/></svg>
QQ
</button>
<button class="social-btn" onclick="thirdPartyLogin('douyin')">
<svg viewBox="0 0 24 24" fill="#000"><path d="M12 2L14 8h6l-5 4 2 6-5-4-5 4 2-6-5-4h6z"/></svg>
抖音
</button>
</div>
<div class="footer-links">
还没有账号？<a href="#register">立即注册</a><br>
<a href="#forgot">忘记密码？</a> | <a href="index.html">返回首页</a>
</div>
</div>

<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();

  const username = document.getElementById('username').value;
  const password = document.getElementById('password').value;
  const errorMsg = document.getElementById('errorMessage');

  try {
    const response = await fetch('/api/auth/login', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({ username: username, password: password })
    });

    if (response.ok) {
      const data = await response.json();
      localStorage.setItem('token', data.access_token);
      window.location.href = 'http://104.244.90.202:8000/';
    } else {
      const error = await response.json();
      errorMsg.textContent = error.detail || '登录失败，请检查用户名和密码';
      errorMsg.classList.add('show');
    }
  } catch (err) {
    errorMsg.textContent = '网络错误，请稍后重试';
    errorMsg.classList.add('show');
  }
});

function thirdPartyLogin(platform) {
  const errorMsg = document.getElementById('errorMessage');
  errorMsg.textContent = `${platform === 'wechat' ? '微信' : platform === 'qq' ? 'QQ' : '抖音'}登录功能开发中，敬请期待`;
  errorMsg.classList.add('show');

  setTimeout(() => {
    errorMsg.classList.remove('show');
  }, 3000);
}
</script>
</body>
</html>
