version: '3.8'

services:
  # 测试数据库
  postgres-test:
    image: postgres:14-alpine
    container_name: ai-novel-postgres-test
    environment:
      POSTGRES_DB: ai_novel_media_test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5433:5432"
    networks:
      - test-network
    tmpfs:
      - /var/lib/postgresql/data

  # 测试 Redis
  redis-test:
    image: redis:7-alpine
    container_name: ai-novel-redis-test
    ports:
      - "6380:6379"
    networks:
      - test-network
    tmpfs:
      - /data

networks:
  test-network:
    driver: bridge
